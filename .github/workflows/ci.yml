name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Firebase rule tests
        run: npm run test:rules:emulators

      - name: Audit
        run: npm run audit:ci

      - name: Web build
        run: npm run build --workspace @orbit-ledger/web

      - name: Install browser for web smoke
        run: npx playwright install --with-deps chromium

      - name: Web browser smoke
        run: |
          npm run dev --workspace @orbit-ledger/web > /tmp/orbit-ledger-web.log 2>&1 &
          WEB_PID=$!
          trap 'kill $WEB_PID' EXIT
          for attempt in {1..45}; do
            if curl -fsS http://localhost:3000/login/ >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:3000/login/ >/dev/null
          npm run qa:web-browser-smoke

      - name: Seeded web browser smoke
        env:
          NEXT_PUBLIC_ORBIT_LEDGER_RECAPTCHA_V3_SITE_KEY: ${{ secrets.ORBIT_LEDGER_RECAPTCHA_V3_SITE_KEY }}
          NEXT_PUBLIC_ORBIT_LEDGER_APPCHECK_DEBUG_TOKEN: ${{ secrets.ORBIT_LEDGER_APPCHECK_DEBUG_TOKEN }}
          ORBIT_LEDGER_QA_EMAIL: ${{ secrets.ORBIT_LEDGER_QA_EMAIL }}
          ORBIT_LEDGER_QA_PASSWORD: ${{ secrets.ORBIT_LEDGER_QA_PASSWORD }}
          ORBIT_LEDGER_QA_VIEWER_EMAIL: ${{ secrets.ORBIT_LEDGER_QA_VIEWER_EMAIL }}
          ORBIT_LEDGER_QA_VIEWER_PASSWORD: ${{ secrets.ORBIT_LEDGER_QA_VIEWER_PASSWORD }}
          ORBIT_LEDGER_FIRESTORE_ADMIN_ACCESS_TOKEN: ${{ secrets.ORBIT_LEDGER_FIRESTORE_ADMIN_ACCESS_TOKEN }}
          ORBIT_LEDGER_STORAGE_ADMIN_ACCESS_TOKEN: ${{ secrets.ORBIT_LEDGER_STORAGE_ADMIN_ACCESS_TOKEN }}
        run: |
          if [ -z "$ORBIT_LEDGER_QA_EMAIL" ] || [ -z "$ORBIT_LEDGER_QA_PASSWORD" ] || [ -z "$NEXT_PUBLIC_ORBIT_LEDGER_RECAPTCHA_V3_SITE_KEY" ] || [ -z "$NEXT_PUBLIC_ORBIT_LEDGER_APPCHECK_DEBUG_TOKEN" ]; then
            echo "Skipping seeded web browser smoke because required QA/App Check secrets are not configured."
            exit 0
          fi
          npm run dev --workspace @orbit-ledger/web > /tmp/orbit-ledger-web-seeded.log 2>&1 &
          WEB_PID=$!
          trap 'kill $WEB_PID' EXIT
          for attempt in {1..45}; do
            if curl -fsS http://localhost:3000/login/ >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:3000/login/ >/dev/null
          npm run qa:seed-web-workspace
          node scripts/web-browser-smoke.mjs --authenticated --skip-unauthenticated

      - name: Expo doctor
        run: npm run doctor --workspace @orbit-ledger/mobile
