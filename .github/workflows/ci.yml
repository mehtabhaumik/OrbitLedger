name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Firebase rule tests
        run: npx -y firebase-tools@13.35.1 emulators:exec --project orbit-ledger-ci --only firestore "npm run test:rules"

      - name: Audit
        run: npm run audit:ci

      - name: Web build
        run: npm run build --workspace @orbit-ledger/web

      - name: Expo doctor
        run: npm run doctor --workspace @orbit-ledger/mobile
